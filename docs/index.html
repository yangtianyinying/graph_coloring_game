<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>图着色推断实验</title>
  <link rel="stylesheet" href="https://esm.sh/jspsych@7.3.4/css/jspsych.css" />
  <link rel="stylesheet" href="experiment_site/css/app.css" />
  <script type="importmap">
  {
    "imports": {
      "jspsych": "https://esm.sh/jspsych@7.3.4",
      "@jspsych/plugin-html-keyboard-response": "https://esm.sh/@jspsych/plugin-html-keyboard-response@1.1.3",
      "@jspsych/plugin-survey-text": "https://esm.sh/@jspsych/plugin-survey-text@1.1.3",
      "@jspsych/plugin-call-function": "https://esm.sh/@jspsych/plugin-call-function@1.1.2"
    }
  }
  </script>
</head>
<body>
  <header class="app-header">
    <h1>图着色推断实验</h1>
    <nav class="tabs">
      <button type="button" id="tab-editor" data-panel="panel-editor">刺激集生成</button>
      <button type="button" id="tab-run" data-panel="panel-run">主实验区</button>
    </nav>
  </header>

  <main>
    <section id="panel-editor" class="panel active">
      <div class="editor-toolbar">
        <label>刺激集名称 <input type="text" id="editor-stimulus-name" placeholder="my-stimulus-set" /></label>
        <label>画布宽 <input type="number" id="editor-canvas-w" min="400" max="2000" value="960" /></label>
        <label>画布高 <input type="number" id="editor-canvas-h" min="300" max="1400" value="620" /></label>
        <button type="button" id="btn-add-block">添加 Block</button>
        <button type="button" id="btn-add-trial">向当前 Block 添加 Trial</button>
        <span class="sep"></span>
        <button type="button" id="btn-add-node">添加节点</button>
        <button type="button" id="btn-edge-mode">连边：点两个节点</button>
        <button type="button" id="btn-clear-edges">清除所有边</button>
        <span class="sep"></span>
        <button type="button" id="btn-import">导入 JSON</button>
        <button type="button" id="btn-export">导出 JSON</button>
        <input type="file" id="file-import" accept="application/json,.json" hidden />
      </div>
      <div class="editor-body">
        <aside class="editor-sidebar">
          <h2>Block / Trial</h2>
          <div id="block-trial-tree"></div>
          <h2>当前 Trial</h2>
          <label>graphId <input type="text" id="trial-graph-id" /></label>
          <label>orderMode
            <select id="trial-order-mode">
              <option value="sequential">自定顺序 sequential</option>
              <option value="free">自由顺序 free</option>
            </select>
          </label>
          <p class="hint">已着色节点在「着色」列表中设定；被试仅报告未着色节点。</p>
          <h3>着色节点（初始信念）</h3>
          <div id="colored-nodes-panel"></div>
          <button type="button" id="btn-add-colored">添加着色节点</button>
          <h3 id="report-order-heading">报告顺序（仅未着色，可拖拽排序）</h3>
          <ul id="report-order-list" class="sortable-list"></ul>
          <p id="report-order-free-hint" class="hint hidden">自由顺序模式下被试自选下一个未着色节点。</p>
        </aside>
        <div class="editor-canvas-wrap">
          <canvas id="editor-canvas" width="960" height="620"></canvas>
          <div class="editor-canvas-hint">拖拽节点调整位置；连边模式：依次点击两个节点。</div>
        </div>
        <aside class="editor-picker-panel">
          <h3>为「添加着色节点」选色（三角盘）</h3>
          <canvas id="editor-picker-canvas" width="280" height="280"></canvas>
          <div class="rgb-readout" id="editor-rgb-readout"></div>
        </aside>
      </div>
    </section>

    <section id="panel-run" class="panel">
      <div class="run-toolbar">
        <label>被试编号 <input type="text" id="run-participant" placeholder="P001" /></label>
        <input type="file" id="run-stimulus-file" accept="application/json,.json" />
        <button type="button" id="btn-start-exp">开始实验（jsPsych）</button>
        <p id="run-stimulus-status" class="hint">请先选择刺激集 JSON 文件</p>
      </div>
      <div id="jspsych-target"></div>
    </section>
  </main>

  <script src="experiment_site/js/graphTheme.js"></script>
  <script src="experiment_site/js/trianglePicker.js"></script>
  <script src="experiment_site/js/graphCanvas.js"></script>
  <script src="experiment_site/js/editor.js"></script>
  <script src="experiment_site/js/app.js"></script>
  <script type="module" src="experiment_site/js/runner.js"></script>
</body>
</html>
